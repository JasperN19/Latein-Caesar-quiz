<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Politica — Quiz zur politischen Laufbahn Caesars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0d;
    --bg-alt:#0e0e13;
    --glass:rgba(255,255,255,0.045);
    --glass-strong:rgba(255,255,255,0.07);
    --border:rgba(255,255,255,0.09);
    --text:#ededf0;
    --text-dim:rgba(237,237,240,0.56);
    --text-faint:rgba(237,237,240,0.32);
    --accent:#c9a15a;
    --accent-soft:rgba(201,161,90,0.14);
    --accent-line:rgba(201,161,90,0.55);
    --wrong:#c05a54;
    --wrong-soft:rgba(192,90,84,0.13);
    --mono:'Space Mono', ui-monospace, 'SF Mono', monospace;
    --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}
  html,body{height:100%; scroll-behavior: smooth;}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; position:relative; overflow-x:hidden; -webkit-font-smoothing:antialiased;}
  .grid-bg{position:fixed; inset:0; background-image:radial-gradient(rgba(255,255,255,0.075) 1px, transparent 1px); background-size:24px 24px; z-index:0;}
  .vignette{position:fixed; inset:0; z-index:1; pointer-events:none; background:radial-gradient(ellipse at center, transparent 35%, var(--bg) 100%), linear-gradient(var(--bg-alt), var(--bg) 60%); opacity:0.9;}
  .app{position:relative; z-index:2; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px 16px;}
  .wrap{width:100%; max-width:600px;}
  .eyebrow{font-family:var(--mono); font-size:0.72rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--accent); margin-bottom:14px;}
  .start{text-align:center; animation:fadeUp 0.6s ease both;}
  .start h1{font-family:var(--mono); font-weight:700; font-size:clamp(2.4rem, 9vw, 4.2rem); letter-spacing:0.04em; line-height:1; background:linear-gradient(180deg, #fff, #a9a9b2); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:18px;}
  .start .sub{font-size:1.05rem; color:var(--text-dim); max-width:440px; margin:0 auto 28px; line-height:1.55;}
  .meta-line{font-family:var(--mono); font-size:0.78rem; color:var(--text-faint); letter-spacing:0.06em; margin-bottom:36px;}
  .meta-line span{color:var(--accent);}
  .btn{font-family:var(--sans); font-weight:600; font-size:1rem; border:none; cursor:pointer; border-radius:12px; padding:16px 32px; transition:transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease; display: inline-block; text-decoration: none;}
  .btn:focus-visible{outline:2px solid var(--accent); outline-offset:3px;}
  .btn-primary{background:var(--accent); color:#1a1408; box-shadow:0 0 0 1px rgba(201,161,90,0.4), 0 8px 24px -8px rgba(201,161,90,0.5);}
  .btn-primary:active{transform:scale(0.98);}
  @media(hover: hover){.btn-primary:hover{transform:translateY(-1px); box-shadow:0 0 0 1px rgba(201,161,90,0.6), 0 10px 28px -6px rgba(201,161,90,0.65);}}
  .btn-ghost{background:transparent; color:var(--text); border:1px solid var(--border);}
  @media(hover: hover){.btn-ghost:hover{border-color:var(--accent-line); background:var(--accent-soft);}}
  .ladder{position:relative; display:flex; justify-content:space-between; align-items:center; margin-bottom:36px; padding:0 4px;}
  .ladder-track{position:absolute; left:16px; right:16px; top:9px; height:2px; background:var(--border); z-index:0;}
  .ladder-fill{position:absolute; left:16px; top:9px; height:2px; background:var(--accent); z-index:1; transition:width 0.5s ease;}
  .rung{position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:8px;}
  .rung-dot{width:20px; height:20px; border-radius:50%; background:var(--bg); border:2px solid var(--border); transition:all 0.3s ease;}
  .rung.done .rung-dot{background:var(--accent); border-color:var(--accent);}
  .rung.active .rung-dot{border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft);}
  .rung-label{font-family:var(--mono); font-size:0.58rem; letter-spacing:0.04em; color:var(--text-faint); text-transform:uppercase; white-space:nowrap;}
  .rung.active .rung-label{color:var(--accent);}
  .rung.done .rung-label{color:var(--text-dim);}
  @media (max-width:400px){
    .rung-label{font-size:0.48rem; letter-spacing:0.01em;}
    .rung-dot{width:16px; height:16px;}
    .ladder-track, .ladder-fill{top:7px;}
  }
  @media (max-width:340px){
    .rung-label{font-size:0.4rem;}
  }

  .card{background:var(--glass); border:1px solid var(--border); border-radius:20px; padding:30px 24px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); box-shadow:0 20px 60px -30px rgba(0,0,0,0.6); animation:fadeUp 0.4s ease both;}
  .card-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px;}
  .q-index{font-family:var(--mono); font-size:0.85rem; color:var(--text-faint);}
  .q-index b{color:var(--accent); font-size:1.1rem;}
  .stage-chip{font-family:var(--mono); font-size:0.66rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); background:var(--accent-soft); border:1px solid var(--accent-line); padding:4px 10px; border-radius:100px;}
  .q-text{font-size:clamp(1.08rem, 2.6vw, 1.3rem); font-weight:600; line-height:1.45; margin-bottom:22px;}
  .options{display:flex; flex-direction:column; gap:12px;}
  .option{font-family:var(--sans); text-align:left; font-size:0.98rem; color:var(--text); background:rgba(255,255,255,0.025); border:1px solid var(--border); border-radius:12px; padding:16px 18px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:10px; transition:all 0.15s ease;}
  @media(hover: hover){.option:hover:not(.answered .option){border-color:var(--accent-line); background:var(--accent-soft); transform:translateX(2px);}}
  .option:active:not(.answered .option){background:var(--accent-soft);}
  .options.locked .option{cursor:default;}
  .options.locked .option:not(.correct):not(.wrong){opacity:0.4;}
  .option.correct{border-color:var(--accent); background:var(--accent-soft);}
  .option.wrong{border-color:var(--wrong); background:var(--wrong-soft);}
  .mark{font-family:var(--mono); font-size:0.95rem; flex-shrink:0;}
  .mark.correct{color:var(--accent);}
  .mark.wrong{color:var(--wrong);}
  .explain{margin-top:20px; padding-top:16px; border-top:1px solid var(--border); font-size:0.92rem; line-height:1.6; color:var(--text-dim); animation:fadeUp 0.35s ease both;}
  .explain b{font-family:var(--mono); font-size:0.68rem; letter-spacing:0.1em; color:var(--accent); display:block; margin-bottom:6px;}
  .card-foot{display:flex; justify-content:flex-end; margin-top:22px;}
  .result{text-align:center; animation:fadeUp 0.5s ease both;}
  .score-big{font-family:var(--mono); font-weight:700; font-size:clamp(3.2rem, 14vw, 5.2rem); color:var(--text); line-height:1; margin-bottom:6px;}
  .score-big span{color:var(--accent);}
  .score-pct{font-family:var(--mono); font-size:0.9rem; color:var(--text-faint); letter-spacing:0.06em; margin-bottom:22px;}
  .verdict{font-size:1.05rem; color:var(--text-dim); max-width:440px; margin:0 auto 32px; line-height:1.55;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="vignette"></div>
<div class="app" id="app"></div>
<script>
  const stageNames = ["QUAESTOR","AEDILIS","PRAETOR","CONSUL","DICTATOR"];
  const roman = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV","XVI"];
  const questions = [
    {stage:0, q:"In welchem Jahr wurde Gaius Julius Caesar geboren?", options:["100 v. Chr.","82 v. Chr.","44 v. Chr.","27 v. Chr."], correct:0, explain:"Caesars Geburt wird traditionell auf den 13. Juli 100 v. Chr. datiert."},
    {stage:0, q:"Aus welcher patrizischen Familie (gens) stammte Caesar?", options:["Gens Julia","Gens Claudia","Gens Cornelia","Gens Flavia"], correct:0, explain:"Die Julier leiteten ihre Abstammung mythologisch von Aeneas und der Göttin Venus ab."},
    {stage:0, q:"Welches Amt markierte 69 v. Chr. den Beginn von Caesars politischer Ämterlaufbahn?", options:["Quaestor","Konsul","Zensor","Diktator"], correct:0, explain:"Als Quaestor betrat Caesar die unterste Sprosse des Cursus honorum."},
    {stage:1, q:"Wofür war Caesar als kurulischer Ädil vor allem zuständig?", options:["Öffentliche Spiele, Märkte und Bauten","Die Außenpolitik Roms","Rechtsprechung in Erbschaftsfragen","Kommandogewalt über die Legionen"], correct:0, explain:"Mit aufwendigen Spielen gewann Caesar große Popularität."},
    {stage:1, q:"Welches religiöse Amt übernahm Caesar 63 v. Chr.?", options:["Pontifex Maximus","Augur","Flamen Dialis","Rex Sacrorum"], correct:0, explain:"Als oberster Priester Roms gewann Caesar politisches Gewicht."},
    {stage:1, q:"Mit wem schloss Caesar 60 v. Chr. das Erste Triumvirat?", options:["Pompeius und Crassus","Antonius und Lepidus","Cato und Cicero","Sulla und Marius"], correct:0, explain:"Das Bündnis sicherte Caesar den Weg zum Konsulat."},
    {stage:2, q:"In welchem Jahr wurde Caesar zum Prätor gewählt?", options:["62 v. Chr.","70 v. Chr.","55 v. Chr.","48 v. Chr."], correct:0, explain:"Das Prätorenamt folgte auf die Ädilität."},
    {stage:2, q:"Welches Gebiet verwaltete Caesar als Prokonsul?", options:["Gallien","Hispania Ulterior","Makedonien","Ägypten"], correct:0, explain:"Das gallische Kommando gab Caesar mehrere Legionen."},
    {stage:2, q:"Wie lange dauerte der Gallische Krieg ungefähr?", options:["Etwa 8 Jahre (58–50 v. Chr.)","Etwa 2 Jahre","Etwa 20 Jahre","Etwa 15 Jahre"], correct:0, explain:"Caesar unterwarf in dieser Zeit weite Teile Galliens."},
    {stage:3, q:"In welchem Jahr wurde Caesar zum ersten Mal Konsul?", options:["59 v. Chr.","49 v. Chr.","44 v. Chr.","100 v. Chr."], correct:0, explain:"Das Konsulat war das höchste reguläre Amt der Republik."},
    {stage:3, q:"Welchen Fluss überschritt Caesar 49 v. Chr.?", options:["Den Rubikon","Den Tiber","Den Rhein","Den Nil"], correct:0, explain:"Die Grenzüberschreitung löste den Bürgerkrieg aus."},
    {stage:3, q:"In welcher Schlacht besiegte Caesar Pompeius 48 v. Chr.?", options:["Pharsalos","Cannae","Zama","Actium"], correct:0, explain:"Pompeius floh danach nach Ägypten."},
    {stage:4, q:"Welchen Titel nahm Caesar 44 v. Chr. auf Lebenszeit an?", options:["Dictator perpetuo","Imperator Augustus","Princeps Senatus","Consul perpetuo"], correct:0, explain:"Dies weckte Ängste vor einer Rückkehr zum Königtum."},
    {stage:4, q:"An welchem Tag wurde Caesar ermordet?", options:["15. März 44 v. Chr.","1. Januar 44 v. Chr.","31. Oktober 45 v. Chr.","23. September 44 v. Chr."], correct:0, explain:"Die Iden des März sind bis heute ein Sinnbild."},
    {stage:4, q:"Wer gehörte zu den Verschwörern gegen Caesar?", options:["Marcus Junius Brutus","Marcus Antonius","Octavian","Cicero"], correct:0, explain:"Brutus wurde zur Symbolfigur des Verrats."},
    {stage:4, q:"Wer wurde Caesars Erbe?", options:["Octavian, der spätere Augustus","Marcus Antonius","Lepidus","Pompeius"], correct:0, explain:"Octavian wurde erster römischer Kaiser."}
  ];
  const state = { screen: "start", current: 0, score: 0, answered: false, selected: null, shuffledOptions: [] };
  const app = document.getElementById("app");
  function shuffleOptions(question) {
    const list = question.options.map((opt, index) => ({ text: opt, originalIndex: index }));
    for (let i = list.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [list[i], list[j]] = [list[j], list[i]];
    }
    return list;
  }
  function render(){
    if(state.screen === "start") return renderStart();
    if(state.screen === "quiz") return renderQuiz();
    if(state.screen === "result") return renderResult();
  }
  function renderStart(){
    app.innerHTML = `
      <div class="wrap start">
        <div class="eyebrow">Politica</div>
        <h1>CAESAR</h1>
        <p class="sub">Ein Quiz zur politischen Laufbahn des Gaius Julius Caesar.</p>
        <div class="meta-line"><span>${questions.length}</span> Fragen · Multiple Choice</div>
        <button class="btn btn-primary" id="startBtn">Quiz starten</button>
      </div>
    `;
    document.getElementById("startBtn").onclick = () => {
      state.screen = "quiz"; state.current = 0; state.score = 0; state.answered = false; state.selected = null;
      state.shuffledOptions = shuffleOptions(questions[state.current]);
      render();
    };
  }
  function renderLadder(stageIdx){
    const rungs = stageNames.map((name, i) => {
      let cls = "rung";
      if(i < stageIdx) cls += " done"; else if(i === stageIdx) cls += " active";
      return `<div class="${cls}"><div class="rung-dot"></div><div class="rung-label">${name}</div></div>`;
    }).join("");
    const fillPct = (stageIdx / (stageNames.length - 1)) * 100;
    return `<div class="ladder"><div class="ladder-track"></div><div class="ladder-fill" style="width:calc(${fillPct}% - ${fillPct/100*32}px)"></div>${rungs}</div>`;
  }
  function renderQuiz(){
    const q = questions[state.current];
    const lockedClass = state.answered ? "locked" : "";
    const optionsHtml = state.shuffledOptions.map((opt, i) => {
      let cls = "option"; let mark = "";
      if(state.answered){
        if(opt.originalIndex === q.correct){ cls += " correct"; mark = `<span class="mark correct">✓</span>`; }
        else if(i === state.selected){ cls += " wrong"; mark = `<span class="mark wrong">✕</span>`; }
      }
      return `<button class="${cls}" data-i="${i}"><span>${opt.text}</span>${mark}</button>`;
    }).join("");
    app.innerHTML = `
      <div class="wrap">
        ${renderLadder(q.stage)}
        <div class="card">
          <div class="card-head">
            <div class="q-index"><b>${roman[state.current]}</b> / ${roman[questions.length-1]}</div>
            <div class="stage-chip">${stageNames[q.stage]}</div>
          </div>
          <div class="q-text">${q.q}</div>
          <div class="options ${lockedClass}" id="optionsWrap">${optionsHtml}</div>
          ${state.answered ? `<div class="explain"><b>Erklärung</b>${q.explain}</div>` : ""}
          ${state.answered ? `<div class="card-foot"><button class="btn btn-primary" id="nextBtn">${state.current === questions.length-1 ? "Ergebnis anzeigen" : "Weiter →"}</button></div>` : ""}
        </div>
      </div>
    `;
    if(!state.answered){
      document.querySelectorAll(".option").forEach(btn => { btn.onclick = () => selectOption(parseInt(btn.dataset.i)); });
    } else {
      document.getElementById("nextBtn").onclick = nextQuestion;
    }
  }
  function selectOption(i){
    if(state.answered) return;
    state.answered = true; state.selected = i;
    const selectedOpt = state.shuffledOptions[i];
    if(selectedOpt.originalIndex === questions[state.current].correct) state.score++;
    render();
  }
  function nextQuestion(){
    if(state.current < questions.length - 1){
      state.current++; state.answered = false; state.selected = null;
      state.shuffledOptions = shuffleOptions(questions[state.current]);
      render();
    } else { state.screen = "result"; render(); }
  }
  function verdictText(pct){
    if(pct >= 90) return "Ave, Dictator perpetuo – eine nahezu makellose Laufbahn.";
    if(pct >= 70) return "Ein solider Cursus honorum.";
    if(pct >= 50) return "Der Rubikon ist überquert, aber es braucht noch Übung.";
    return "Zurück zum Amt des Quaestors – die Laufbahn beginnt von vorn.";
  }
  function renderResult(){
    const pct = Math.round((state.score / questions.length) * 100);
    app.innerHTML = `
      <div class="wrap result">
        <div class="eyebrow">Ergebnis</div>
        <div class="score-big"><span>${state.score}</span> / ${questions.length}</div>
        <div class="score-pct">${pct}% richtig beantwortet</div>
        <p class="verdict">${verdictText(pct)}</p>
        <button class="btn btn-ghost" id="restartBtn">Neu starten</button>
      </div>
    `;
    document.getElementById("restartBtn").onclick = () => {
      state.current = 0; state.score = 0; state.answered = false; state.selected = null; state.screen = "quiz";
      state.shuffledOptions = shuffleOptions(questions[state.current]);
      render();
    };
  }
  render();
</script>
</body>
</html>
